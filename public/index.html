<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL SHORTENER</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen text-white">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-lg w-[400px] text-center">

        <h1 class="text-2xl font-bold mb-6">URL SHORTENER</h1>

        <input 
            id="urlInput"
            type="text"
            placeholder="Enter long URL..."
            class="w-full p-3 rounded-lg text-white mb-4 outline-none"
        />

        <button 
            onclick="shortenUrl()"
            class="w-full bg-sky-500 hover:bg-sky-600 p-3 rounded-lg font-semibold transition"
            >
            Shorten URL
        </button>

       <div id="result" class="mt-6 text-green-400 break-words"></div>

  </div>
    
  <script src = "script.js"></script>
    
</body>
</html>
